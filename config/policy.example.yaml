# =============================================================================
# Wafa 策略配置模板
# =============================================================================
# 复制此文件到 ~/.wafa/policy.yaml 后按需修改。
# wafa init 命令会自动完成此复制。
#
# 所有金额按"人类可读单位"填写:
#   - 原生币(native): ETH 单位, 如 0.05
#   - 代币(token):   USDC 单位, 如 10 (会按 token_decimals 自动换算)
# =============================================================================

# 默认/当前使用的链(对应 config.yaml 中 chains 的 key)
default_chain: base

# ---------------------------------------------------------------------------
# 限额控制
# ---------------------------------------------------------------------------
limits:
  # 单笔上限: 任一方向的单次转账不得超过此值
  max_per_tx_native: 0.05        # 单笔原生币上限 (ETH)
  max_per_tx_token: 10           # 单笔代币上限  (USDC)

  # 日累计上限: 当日所有成功转账之和不得超过此值(每日 0 点按本地时间重置)
  daily_limit_native: 0.5        # 日累计原生币上限 (ETH)
  daily_limit_token: 100         # 日累计代币上限  (USDC)

# ---------------------------------------------------------------------------
# 速率限制: 防止 Agent 失控高频转账
# ---------------------------------------------------------------------------
rate_limit:
  max_tx_per_minute: 5           # 每分钟最多 5 笔(滑动窗口)
  max_tx_per_hour: 50            # 每小时最多 50 笔

# ---------------------------------------------------------------------------
# 收款白名单
# ---------------------------------------------------------------------------
whitelist:
  enabled: false                 # MVP 默认关闭, 开启后只允许向列表内地址转账
  addresses:
    # - "0xRecipientA..."
    # - "0xRecipientB..."

# ---------------------------------------------------------------------------
# 用途/理由约束
# ---------------------------------------------------------------------------
safety:
  require_reason: true           # 转账必须附 --reason, 否则拒绝
  allowed_purposes: []           # 空 = 不限制用途文本; 填写则 reason 必须命中其一
  # allowed_purposes:
  #   - "402_http_payment"
  #   - "api_access"
  #   - "data_purchase"

# ---------------------------------------------------------------------------
# 紧急停止: 设为 true 后所有转账立即被拒绝(不改代码的 kill switch)
# ---------------------------------------------------------------------------
kill_switch: false
